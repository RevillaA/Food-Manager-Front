@if (isLoading()) {
  <div class="flex min-h-screen items-center justify-center bg-[#111111]">
    <div class="rounded-2xl bg-white px-6 py-6 text-center shadow-xl">
      <div class="mx-auto mb-3 h-8 w-8 animate-spin rounded-full border-2 border-gray-300 border-t-[#E2552E]"></div>
      <p class="text-sm font-semibold text-gray-700">Cargando sesión...</p>
    </div>
  </div>
} @else {
  <div class="flex h-screen overflow-hidden bg-[#f7f5f2]">

    <app-sidebar
      class="shrink-0"
      [isOpen]="isSidebarOpen()"
      [currentRole]="currentRole()"
    />

    <div class="flex flex-1 flex-col min-w-0">

      <app-topbar
        [currentUser]="currentUser()"
        (toggleSidebar)="toggleSidebar()"
      />

      <main class="flex-1 overflow-y-auto p-5">
        <router-outlet />
      </main>

    </div>
  </div>
}
