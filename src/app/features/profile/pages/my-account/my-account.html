<section class="page">
  <div class="page__header">
    <h2>Mi cuenta</h2>
    <p>Información básica de la sesión actual.</p>
  </div>

  <article class="placeholder-card">
    <h3>Datos del usuario</h3>

    @if (user()) {
      <div class="account-data">
        <div><strong>Nombre:</strong> {{ user()?.full_name }}</div>
        <div><strong>Usuario:</strong> {{ user()?.username }}</div>
        <div><strong>Email:</strong> {{ user()?.email || 'No registrado' }}</div>
        <div><strong>Rol:</strong> {{ user()?.role?.name }}</div>
        <div><strong>Estado:</strong> {{ user()?.is_active ? 'Activo' : 'Inactivo' }}</div>
      </div>
    }
  </article>
</section>
